<!-- Botón hamburguesa (solo móvil) -->
<button class="sidebar-toggle" (click)="toggle()" [attr.aria-expanded]="isOpen()" aria-label="Abrir menú">
  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22" height="22">
    @if (isOpen()) {
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
    } @else {
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16" />
    }
  </svg>
</button>

<!-- Overlay oscuro (solo móvil cuando está abierto) -->
@if (isOpen()) {
  <div class="sidebar-overlay" (click)="close()"></div>
}

<aside class="sidebar" [class.sidebar--open]="isOpen()">
  <div class="sidebar__header">
    <div class="sidebar__logo">
      <div class="sidebar__logo-icon">A</div>
      <span class="sidebar__title">API Panel</span>
    </div>
    <p class="sidebar__subtitle">Panel de control</p>
  </div>

  <nav class="sidebar__nav">
    <a
      routerLink="/dashboard"
      routerLinkActive="sidebar__link--active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar__link"
      (click)="close()"
    >
      <svg class="sidebar__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
      </svg>
      Dashboard
    </a>

    <div class="sidebar__section-label"><p>WhatsApp</p></div>

    <a
      routerLink="/whatsapp"
      routerLinkActive="sidebar__link--active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar__link"
      (click)="close()"
    >
      <svg class="sidebar__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
      </svg>
      Registros
    </a>

    <a
      routerLink="/whatsapp/new"
      routerLinkActive="sidebar__link--active"
      class="sidebar__link"
      (click)="close()"
    >
      <svg class="sidebar__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 4v16m8-8H4" />
      </svg>
      Validar número
    </a>

    <div class="sidebar__section-label"><p>Transcripciones</p></div>

    <a
      routerLink="/transcripciones"
      routerLinkActive="sidebar__link--active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar__link"
      (click)="close()"
    >
      <svg class="sidebar__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" />
      </svg>
      Registros
    </a>

    <a
      routerLink="/transcripciones/new"
      routerLinkActive="sidebar__link--active"
      class="sidebar__link"
      (click)="close()"
    >
      <svg class="sidebar__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 4v16m8-8H4" />
      </svg>
      Nueva transcripción
    </a>
    <div class="sidebar__section-label"><p>Sistema</p></div>

    <a
      routerLink="/settings"
      routerLinkActive="sidebar__link--active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar__link"
      (click)="close()"
    >
      <svg class="sidebar__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      Configuración
    </a>
  </nav>

  <div class="sidebar__footer">
    <div class="sidebar__footer-dot"></div>
    <p class="sidebar__footer-url" [title]="apiUrl()">{{ apiUrl() }}</p>
  </div>
</aside>
